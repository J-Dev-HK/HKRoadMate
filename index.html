<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>HKRoadMate | 香港泊車及咪錶實時地圖</title>

    <link rel="manifest" href='data:application/manifest+json,{"name":"HKRoadMate","short_name":"RoadMate","display":"standalone","background_color":"#ffffff","start_url":"."}'>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root {
            --glass-white: rgba(255, 255, 255, 0.72);
            --liquid-blue: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
        }
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            background: #f2f2f7;
            overflow: hidden; height: 100vh;
        }
        .liquid-glass {
            background: var(--glass-white);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 0.5px solid rgba(255,255,255,0.4);
        }
        #map { height: calc(100vh - 85px); width: 100%; position: absolute; top: 0; z-index: 1; }
        
        /* 底部導航 & 視圖切換 */
        .view-content { display: none; height: calc(100vh - 85px); overflow-y: auto; z-index: 10; position: relative; background: #f2f2f7; padding-top: 20px; }
        .view-content.active { display: block; }
        #map-view.active { display: block; background: transparent; }

        /* Leaflet Popup Customization */
        .leaflet-popup-content-wrapper {
            border-radius: 24px !important;
            padding: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15) !important;
        }
        .leaflet-container a.leaflet-popup-close-button { font-size: 20px; padding: 12px; color: #8e8e93; }

        /* MarkerCluster Styling */
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background-color: rgba(0, 122, 255, 0.15); }
        .marker-cluster div { background-color: rgba(0, 122, 255, 0.85); color: white; font-weight: bold; border: 3px solid white; }

        .safe-bottom { padding-bottom: calc(85px + env(safe-area-inset-bottom)); }
        .interactive-scale:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full liquid-glass z-[100] px-6 pt-[max(env(safe-area-inset-top),1rem)] pb-4 flex justify-between items-center rounded-b-[2.5rem] shadow-sm">
        <div>
            <h1 class="text-2xl font-black tracking-tight text-slate-900">HKRoadMate</h1>
            <p id="conn-status" class="text-[10px] font-bold text-orange-500 uppercase flex items-center">
                <span class="w-2 h-2 rounded-full bg-orange-500 mr-1.5 animate-pulse"></span> 初始化數據庫...
            </p>
        </div>
        <div class="flex space-x-2">
            <button onclick="app.refreshData()" class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm text-blue-600 interactive-scale">
                <i class="fa-solid fa-rotate"></i>
            </button>
        </div>
    </header>

    <main id="map-view" class="view-content active">
        <div class="fixed top-24 left-1/2 -translate-x-1/2 z-[50] flex bg-white/80 backdrop-blur-lg p-1.5 rounded-full shadow-lg border border-white/50">
            <button onclick="app.filter('all')" id="f-all" class="px-5 py-2 rounded-full text-xs font-bold transition-all bg-blue-600 text-white">全部</button>
            <button onclick="app.filter('carpark')" id="f-carpark" class="px-5 py-2 rounded-full text-xs font-bold transition-all text-slate-500">停車場</button>
            <button onclick="app.filter('meter')" id="f-meter" class="px-5 py-2 rounded-full text-xs font-bold transition-all text-slate-500">咪錶</button>
        </div>
        <div id="map"></div>
    </main>

    <main id="list-view" class="view-content px-6 safe-bottom">
        <div class="flex justify-between items-end mb-6 mt-20">
            <h2 class="text-3xl font-black text-slate-900">收藏地標</h2>
            <button onclick="ui.openModal('create-list')" class="text-blue-600 font-bold text-sm">新增清單</button>
        </div>
        <div id="lists-render" class="space-y-6"></div>
    </main>

    <nav class="fixed bottom-0 w-full liquid-glass h-[85px] z-[100] px-10 pb-[env(safe-area-inset-bottom)] flex justify-around items-center rounded-t-[2.5rem]">
        <button onclick="ui.switchTab('map')" id="nav-map" class="flex flex-col items-center text-blue-600">
            <i class="fa-solid fa-map-location-dot text-2xl mb-1"></i>
            <span class="text-[10px] font-bold">地圖探索</span>
        </button>
        <button onclick="ui.switchTab('list')" id="nav-list" class="flex flex-col items-center text-slate-400">
            <i class="fa-solid fa-star text-2xl mb-1"></i>
            <span class="text-[10px] font-bold">收藏項目</span>
        </button>
    </nav>

    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[200] hidden opacity-0 transition-opacity duration-300 items-center justify-center">
        <div id="modal-card" class="bg-white/90 w-[85%] max-w-sm rounded-[3rem] p-8 shadow-2xl scale-90 transition-transform duration-300">
            </div>
    </div>

<script>
/**
 * HKRoadMate Core Logic
 */

const STATE = {
    map: null,
    cluster: null,
    data: new Map(),
    currentFilter: 'all',
    activeTab: 'map',
    isSimulation: false
};

const UI_CONFIG = {
    carparkIcon: L.divIcon({
        className: '',
        html: `<div class="w-10 h-10 bg-blue-600 rounded-full border-4 border-white shadow-lg flex items-center justify-center text-white"><i class="fa-solid fa-p text-xl"></i></div>`,
        iconSize: [40, 40], iconAnchor: [20, 20], popupAnchor: [0, -20]
    }),
    meterIcon: L.divIcon({
        className: '',
        html: `<div class="w-10 h-10 bg-emerald-500 rounded-full border-4 border-white shadow-lg flex items-center justify-center text-white"><i class="fa-solid fa-gauge-high text-lg"></i></div>`,
        iconSize: [40, 40], iconAnchor: [20, 20], popupAnchor: [0, -20]
    })
};

// 數據抓取引擎
const DataEngine = {
    // 跨域跳板清單
    proxies: [
        url => url, // 直接抓取
        url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        url => `https://corsproxy.io/?${encodeURIComponent(url)}`
    ],

    async smartFetchCSV(url) {
        let lastError = null;
        for (const proxyFn of this.proxies) {
            try {
                const res = await fetch(proxyFn(url));
                if (!res.ok) continue;
                const text = await res.text();
                return new Promise(resolve => {
                    Papa.parse(text.trim(), {
                        header: true,
                        skipEmptyLines: true,
                        complete: (results) => {
                            // 清洗 Key 名稱：去除不可見字符並轉小寫
                            const cleanData = results.data.map(row => {
                                const newRow = {};
                                Object.keys(row).forEach(k => {
                                    const cleanK = k.replace(/[^\x20-\x7E]/g, '').trim().toLowerCase();
                                    newRow[cleanK] = row[k];
                                });
                                return newRow;
                            });
                            resolve(cleanData);
                        }
                    });
                });
            } catch (e) { lastError = e; }
        }
        throw lastError;
    },

    async loadCarparks() {
        try {
            const [info, vac] = await Promise.all([
                fetch('https://api.data.gov.hk/v1/carpark-info-vacancy?data=info&lang=zh_TW').then(r => r.json()),
                fetch('https://api.data.gov.hk/v1/carpark-info-vacancy?data=vacancy&lang=zh_TW').then(r => r.json())
            ]);
            const vacMap = new Map();
            (vac.results || []).forEach(v => {
                let vCount = 0;
                if(v.privateCar) vCount = v.privateCar.reduce((s, c) => s + (parseInt(c.vacancy) || 0), 0);
                vacMap.set(v.park_Id, vCount < 0 ? 0 : vCount);
            });
            info.results.forEach(cp => {
                const id = `cp_${cp.park_Id}`;
                STATE.data.set(id, {
                    id, type: 'carpark', name: cp.name,
                    lat: parseFloat(cp.latitude), lng: parseFloat(cp.longitude),
                    available: vacMap.has(cp.park_Id) ? vacMap.get(cp.park_Id) : 'N/A',
                    address: cp.address
                });
            });
            return true;
        } catch (e) { return false; }
    },

    async loadMeters() {
        try {
            // 抓取靜態位置與動態狀態
            const [mPoints, mStatus] = await Promise.all([
                this.smartFetchCSV('https://resource.data.one.gov.hk/td/psiparkingspaces/spaceinfo/parkingspaces.csv'),
                this.smartFetchCSV('https://resource.data.one.gov.hk/td/psiparkingspaces/occupancystatus/occupancystatus.csv')
            ]);

            const statusMap = new Map();
            mStatus.forEach(s => {
                const sid = s.parkingspaceid || s.spaceid;
                const stat = s.occupancystatus || s.status;
                if(sid) statusMap.set(sid.toString().trim(), stat);
            });

            const sections = new Map();
            mPoints.forEach(p => {
                const lat = parseFloat(p.latitude || p.lat);
                const lng = parseFloat(p.longitude || p.long);
                const sid = (p.parkingspaceid || p.spaceid || '').toString().trim();
                const street = p.sectionofstreet_tc || p.street_tc || '未知路段';
                
                if(isNaN(lat) || !sid) return;

                const isVacant = (statusMap.get(sid) === '0' || statusMap.get(sid) === 'V') ? 1 : 0;

                if(!sections.has(street)) {
                    sections.set(street, { 
                        id: `meter_${street}`, type: 'meter', name: street,
                        latSum: 0, lngSum: 0, count: 0, available: 0, 
                        details: [] 
                    });
                }
                const sec = sections.get(street);
                sec.latSum += lat; sec.lngSum += lng; sec.count++;
                sec.available += isVacant;
                sec.details.push(isVacant);
            });

            sections.forEach(sec => {
                sec.lat = sec.latSum / sec.count;
                sec.lng = sec.lngSum / sec.count;
                STATE.data.set(sec.id, sec);
            });
            return true;
        } catch (e) { 
            console.error("Meter Load Failed:", e);
            return false; 
        }
    },

    loadSimulation() {
        STATE.isSimulation = true;
        const mock = [
            { id: 's1', type: 'carpark', name: '[模擬] 尖沙咀海港城', lat: 22.296, lng: 114.167, available: 15 },
            { id: 's2', type: 'carpark', name: '[模擬] 銅鑼灣時代廣場', lat: 22.278, lng: 114.182, available: 0 },
            { id: 's3', type: 'meter', name: '[模擬] 旺角砵蘭街', lat: 22.318, lng: 114.169, count: 6, available: 2, details: [1,0,0,1,0,0] }
        ];
        mock.forEach(m => STATE.data.set(m.id, m));
    }
};

const app = {
    async init() {
        this.initMap();
        await this.refreshData();
    },

    initMap() {
        STATE.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([22.31, 114.17], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(STATE.map);
        STATE.cluster = L.markerClusterGroup({ disableClusteringAtZoom: 17 }).addTo(STATE.map);
    },

    async refreshData() {
        const statusEl = document.getElementById('conn-status');
        statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-orange-500 mr-1.5 animate-pulse"></span> 正在連線政府伺服器...`;
        
        STATE.data.clear();
        const cpOk = await DataEngine.loadCarparks();
        const mtOk = await DataEngine.loadMeters();

        if (!cpOk && !mtOk) {
            DataEngine.loadSimulation();
            statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500 mr-1.5"></span> 伺服器離線 (模擬模式)`;
            statusEl.classList.replace('text-orange-500', 'text-red-500');
        } else {
            statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500 mr-1.5"></span> 數據已更新: ${cpOk?'停車場 OK ':''}${mtOk?'咪錶 OK':''}`;
            statusEl.classList.replace('text-orange-500', 'text-green-500');
        }
        this.render();
    },

    filter(type) {
        STATE.currentFilter = type;
        ['all', 'carpark', 'meter'].forEach(t => {
            const el = document.getElementById(`f-${t}`);
            el.className = t === type ? 'px-5 py-2 rounded-full text-xs font-bold transition-all bg-blue-600 text-white shadow-md' : 'px-5 py-2 rounded-full text-xs font-bold transition-all text-slate-500';
        });
        this.render();
    },

    render() {
        STATE.cluster.clearLayers();
        STATE.data.forEach(item => {
            if (STATE.currentFilter !== 'all' && item.type !== STATE.currentFilter) return;

            const marker = L.marker([item.lat, item.lng], {
                icon: item.type === 'carpark' ? UI_CONFIG.carparkIcon : UI_CONFIG.meterIcon
            });

            const availColor = item.available > 0 ? 'text-emerald-500' : 'text-red-500';
            let popupHtml = `
                <div class="p-3 w-64">
                    <span class="text-[10px] font-black px-2 py-0.5 rounded bg-slate-100 text-slate-500 uppercase mb-2 inline-block">${item.type === 'carpark' ? '停車場' : '路段咪錶'}</span>
                    <h3 class="text-lg font-black text-slate-900 leading-tight mb-2">${item.name}</h3>
                    <div class="bg-slate-50 rounded-2xl p-4 mb-4 text-center border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 mb-1 uppercase">可用車位</p>
                        <p class="text-3xl font-black ${availColor}">${item.available}${item.count ? `<span class="text-slate-300 text-sm"> / ${item.count}</span>` : ''}</p>
                    </div>`;

            if(item.details) {
                popupHtml += `<div class="flex gap-1 mb-4 flex-wrap">
                    ${item.details.map(v => `<div class="h-4 flex-1 min-w-[8px] rounded-sm ${v?'bg-emerald-400':'bg-slate-200'}"></div>`).join('')}
                </div>`;
            }

            popupHtml += `
                <div class="flex gap-2">
                    <button onclick="app.navigate(${item.lat}, ${item.lng})" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-sm interactive-scale shadow-lg shadow-blue-200"><i class="fa-solid fa-location-arrow mr-2"></i>導航</button>
                    <button onclick="ui.savePrompt('${item.id}')" class="w-12 h-12 bg-slate-100 text-yellow-500 rounded-xl interactive-scale flex items-center justify-center"><i class="fa-solid fa-star"></i></button>
                </div>
            </div>`;

            marker.bindPopup(popupHtml);
            STATE.cluster.addLayer(marker);
        });
    },

    navigate(lat, lng) {
        const url = /iPad|iPhone|iPod/.test(navigator.userAgent) ? `maps://?q=${lat},${lng}` : `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
        window.open(url, '_blank');
    }
};

const ui = {
    switchTab(tab) {
        STATE.activeTab = tab;
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById(`${tab}-view`).classList.add('active');
        
        document.getElementById('nav-map').className = tab === 'map' ? 'flex flex-col items-center text-blue-600' : 'flex flex-col items-center text-slate-400';
        document.getElementById('nav-list').className = tab === 'list' ? 'flex flex-col items-center text-blue-600' : 'flex flex-col items-center text-slate-400';

        if(tab === 'list') this.renderList();
        if(tab === 'map') setTimeout(() => STATE.map.invalidateSize(), 100);
    },

    openModal(type, extra = null) {
        const overlay = document.getElementById('modal-overlay');
        const card = document.getElementById('modal-card');
        overlay.classList.remove('hidden');
        setTimeout(() => { overlay.classList.add('opacity-100'); card.classList.remove('scale-90'); }, 10);

        if(type === 'save') {
            const item = STATE.data.get(extra);
            const lists = JSON.parse(localStorage.getItem('hkrm_lists') || '[{"id":"def","name":"我的收藏","items":[]}]');
            card.innerHTML = `
                <h3 class="text-xl font-black mb-6">儲存至...</h3>
                <div class="space-y-3 mb-8">
                    ${lists.map(l => `
                        <button onclick="ui.performSave('${l.id}', '${item.id}')" class="w-full p-4 rounded-2xl bg-slate-50 flex justify-between items-center font-bold text-slate-700 hover:bg-slate-100">
                            ${l.name} <i class="fa-solid fa-plus text-blue-600"></i>
                        </button>
                    `).join('')}
                </div>
                <button onclick="ui.closeModal()" class="w-full py-4 rounded-2xl bg-slate-100 font-bold text-slate-400">取消</button>
            `;
        }
    },

    savePrompt(id) { this.openModal('save', id); },

    performSave(listId, itemId) {
        const lists = JSON.parse(localStorage.getItem('hkrm_lists') || '[{"id":"def","name":"我的收藏","items":[]}]');
        const list = lists.find(l => l.id === listId);
        if(list && !list.items.includes(itemId)) {
            list.items.push(itemId);
            localStorage.setItem('hkrm_lists', JSON.stringify(lists));
        }
        this.closeModal();
    },

    closeModal() {
        const overlay = document.getElementById('modal-overlay');
        overlay.classList.remove('opacity-100');
        document.getElementById('modal-card').classList.add('scale-90');
        setTimeout(() => overlay.classList.add('hidden'), 300);
    },

    renderList() {
        const container = document.getElementById('lists-render');
        const lists = JSON.parse(localStorage.getItem('hkrm_lists') || '[{"id":"def","name":"我的收藏","items":[]}]');
        container.innerHTML = lists.map(l => `
            <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <h4 class="font-black text-xl text-slate-900">${l.name}</h4>
                    <span class="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">${l.items.length} 個地點</span>
                </div>
                <div class="space-y-3">
                    ${l.items.map(itemId => {
                        const item = STATE.data.get(itemId);
                        if(!item) return '';
                        return `
                        <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                            <div>
                                <p class="font-bold text-sm text-slate-800">${item.name}</p>
                                <p class="text-[10px] text-slate-400">${item.type === 'carpark' ? '停車場' : '咪錶'}</p>
                            </div>
                            <button onclick="app.navigate(${item.lat}, ${item.lng})" class="text-blue-600 w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center"><i class="fa-solid fa-arrow-right text-xs"></i></button>
                        </div>`;
                    }).join('')}
                </div>
            </div>
        `).join('');
    }
};

window.onload = () => app.init();
</script>
</body>
</html>
