<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>HK Parking Glass</title>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"HK Parking Glass","short_name":"HK Parking","display":"standalone","background_color":"#ffffff"}'>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        /* 改為乾淨的珍珠白/淺灰動態背景 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #f8f9fa, #e9ecef, #f1f3f5, #dee2e6);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 更透白清澈的 Liquid Glass 效果 */
        .glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        
        .glass-heavy {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.95);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.08);
        }

        /* Map Tweaks */
        #map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100vh - 80px);
            z-index: 10;
        }

        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            border-radius: 1.5rem !important;
            color: #1f2937 !important;
        }

        .leaflet-container a.leaflet-popup-close-button {
            color: #4b5563;
            padding: 8px;
        }

        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
            background-color: rgba(255, 255, 255, 0.6) !important;
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            color: #1e3a8a !important;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .marker-cluster div {
            background-color: transparent !important;
        }

        /* Custom Views */
        .view-section {
            display: none;
            height: calc(100vh - 80px);
            overflow-y: auto;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 20;
            padding-top: env(safe-area-inset-top);
        }
        .view-section.active { display: block; }
        #map-view.active { display: block; z-index: 10; }

        button, div { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-800 antialiased selection:bg-blue-300">

    <header class="fixed top-0 w-full glass z-40 px-6 py-4 pt-[max(env(safe-area-inset-top),1rem)] flex justify-between items-center rounded-b-3xl">
        <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-cyan-500">
            <i class="fa-solid fa-square-parking mr-2"></i>HK Park Glass
        </h1>
        <div id="status-indicator" class="flex items-center text-xs font-semibold px-3 py-1 rounded-full glass-heavy">
            <span class="w-2 h-2 rounded-full bg-yellow-400 mr-2 animate-pulse" id="status-dot"></span>
            <span id="status-text">Loading...</span>
        </div>
    </header>

    <main id="map-view" class="view-section active">
        <div id="map-container"></div>
    </main>

    <main id="list-view" class="view-section px-4 pb-24 pt-28">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold drop-shadow-sm text-gray-800">我的收藏清單</h2>
            <button onclick="uiManager.showAddListModal()" class="glass-heavy px-4 py-2 rounded-2xl text-blue-600 font-semibold shadow-sm active:scale-95">
                <i class="fa-solid fa-plus mr-1"></i> 新增
            </button>
        </div>
        <div id="lists-container" class="space-y-6"></div>
    </main>

    <nav class="fixed bottom-0 w-full glass-heavy pb-[env(safe-area-inset-bottom)] z-40 rounded-t-3xl">
        <div class="flex justify-around items-center h-20 px-6">
            <button onclick="uiManager.switchTab('map')" id="tab-map" class="flex flex-col items-center justify-center w-16 text-blue-600 font-bold active:scale-90">
                <i class="fa-solid fa-map-location-dot text-2xl mb-1 drop-shadow-sm"></i>
                <span class="text-[10px]">地圖</span>
            </button>
            <button onclick="uiManager.switchTab('list')" id="tab-list" class="flex flex-col items-center justify-center w-16 text-gray-400 active:scale-90">
                <i class="fa-solid fa-layer-group text-2xl mb-1"></i>
                <span class="text-[10px]">清單</span>
            </button>
        </div>
    </nav>

    <div id="save-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity">
        <div class="glass-heavy w-[90%] max-w-sm rounded-3xl p-6 transform scale-95 transition-transform" id="save-modal-content">
            <h3 class="text-lg font-bold mb-4 text-gray-800">加入收藏清單</h3>
            <div id="modal-lists-wrapper" class="space-y-3 max-h-60 overflow-y-auto mb-4"></div>
            <button onclick="uiManager.closeModal('save-modal')" class="w-full py-3 rounded-2xl bg-gray-200/50 text-gray-700 font-semibold active:scale-95">取消</button>
        </div>
    </div>

    <div id="create-list-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity">
        <div class="glass-heavy w-[90%] max-w-sm rounded-3xl p-6 transform scale-95 transition-transform" id="create-list-modal-content">
            <h3 class="text-lg font-bold mb-4 text-gray-800">新增清單</h3>
            <input type="text" id="new-list-name" placeholder="例如：上班用、旺角區" class="w-full glass px-4 py-3 rounded-2xl mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-gray-500">
            <div class="flex space-x-3">
                <button onclick="uiManager.closeModal('create-list-modal')" class="flex-1 py-3 rounded-2xl bg-gray-200/50 text-gray-700 font-semibold active:scale-95">取消</button>
                <button onclick="listManager.createList()" class="flex-1 py-3 rounded-2xl bg-blue-500/90 text-white font-semibold shadow-lg active:scale-95">建立</button>
            </div>
        </div>
    </div>

    <script>
        const MOCK_DATA = {
            meters: [
                { id: 'm1', type: 'meter', name: '駱克道 (波斯富街至景隆街)', lat: 22.2805, lng: 114.1830, count: 5, status: [1, 0, 1, 1, 0] },
                { id: 'm2', type: 'meter', name: '大南街 (深水埗段)', lat: 22.3302, lng: 114.1620, count: 8, status: [0, 0, 0, 0, 1, 0, 0, 0] },
                { id: 'm3', type: 'meter', name: '廣東道 (海港城外)', lat: 22.2965, lng: 114.1685, count: 4, status: [0, 0, 0, 0] },
                { id: 'm4', type: 'meter', name: '眾安街 (荃灣段)', lat: 22.3713, lng: 114.1142, count: 6, status: [1, 1, 1, 0, 1, 1] },
                { id: 'm5', type: 'meter', name: '駿業街 (觀塘段)', lat: 22.3115, lng: 114.2238, count: 10, status: [0, 1, 0, 1, 0, 1, 0, 1, 0, 0] }
            ]
        };

        let map, markersGroup, allPoints = [], tempItemToSave = null;

        const listManager = {
            getLists() {
                const lists = localStorage.getItem('hkParkLists');
                return lists ? JSON.parse(lists) : [{ id: 'default', name: '預設收藏', items: [] }];
            },
            saveLists(lists) {
                localStorage.setItem('hkParkLists', JSON.stringify(lists));
                this.renderListsView();
            },
            createList() {
                const nameInput = document.getElementById('new-list-name');
                const name = nameInput.value.trim();
                if (!name) return;
                const lists = this.getLists();
                lists.push({ id: 'list_' + Date.now(), name, items: [] });
                this.saveLists(lists);
                nameInput.value = '';
                uiManager.closeModal('create-list-modal');
            },
            deleteList(listId) {
                if(listId === 'default') return alert("無法刪除預設清單");
                if(confirm("確定刪除此清單？")) {
                    let lists = this.getLists();
                    lists = lists.filter(l => l.id !== listId);
                    this.saveLists(lists);
                }
            },
            addItemToList(listId, item) {
                const lists = this.getLists();
                const targetList = lists.find(l => l.id === listId);
                if (targetList) {
                    if(!targetList.items.find(i => i.id === item.id)) {
                        targetList.items.push(item);
                        this.saveLists(lists);
                        alert('已加入收藏！');
                    } else {
                        alert('項目已存在於此清單。');
                    }
                }
                uiManager.closeModal('save-modal');
            },
            removeItem(listId, itemId) {
                const lists = this.getLists();
                const list = lists.find(l => l.id === listId);
                if(list) {
                    list.items = list.items.filter(i => i.id !== itemId);
                    this.saveLists(lists);
                }
            },
            renderListsView() {
                const container = document.getElementById('lists-container');
                const lists = this.getLists();
                container.innerHTML = '';
                
                if(lists.length === 0) return container.innerHTML = '<div class="text-center text-gray-500 mt-10">尚無清單</div>';

                lists.forEach(list => {
                    let itemsHtml = list.items.length === 0 
                        ? '<p class="text-sm text-gray-400 italic px-2">無收藏項目</p>' 
                        : list.items.map(item => {
                            const availVal = item.available !== undefined ? item.available : (item.status ? item.status.filter(s=>s===1).length : 0);
                            const availColor = availVal > 0 ? 'text-green-500' : (availVal === 0 ? 'text-red-500' : 'text-gray-500');
                            return `
                                <div class="glass p-3 rounded-2xl flex justify-between items-center mb-2 active:scale-95 transition-transform" onclick="app.flyTo(${item.lat}, ${item.lng})">
                                    <div class="flex-1">
                                        <h4 class="font-bold text-gray-800 text-sm">${item.name}</h4>
                                        <p class="text-xs text-gray-500">${item.type === 'carpark' ? '停車場' : '路段咪錶'}</p>
                                    </div>
                                    <div class="flex items-center space-x-3">
                                        <div class="text-right">
                                            <span class="block text-xs text-gray-500">空位</span>
                                            <span class="font-bold text-lg ${availColor}">${availVal}</span>
                                        </div>
                                        <button onclick="event.stopPropagation(); listManager.removeItem('${list.id}', '${item.id}')" class="text-red-400 p-2"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                </div>
                            `;
                        }).join('');

                    const listCard = `
                        <div class="glass-heavy rounded-3xl p-5 shadow-sm relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1 h-full bg-blue-400"></div>
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-bold text-gray-800">${list.name} <span class="text-xs font-normal text-gray-500 ml-2">${list.items.length} 項</span></h3>
                                ${list.id !== 'default' ? `<button onclick="listManager.deleteList('${list.id}')" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>` : ''}
                            </div>
                            <div class="space-y-1">${itemsHtml}</div>
                        </div>
                    `;
                    container.innerHTML += listCard;
                });
            }
        };

        const uiManager = {
            switchTab(tab) {
                document.getElementById('map-view').classList.remove('active');
                document.getElementById('list-view').classList.remove('active');
                
                document.getElementById('tab-map').classList.replace('text-blue-600', 'text-gray-400');
                document.getElementById('tab-map').classList.remove('font-bold');
                document.getElementById('tab-list').classList.replace('text-blue-600', 'text-gray-400');
                document.getElementById('tab-list').classList.remove('font-bold');

                document.getElementById(`${tab}-view`).classList.add('active');
                const activeTab = document.getElementById(`tab-${tab}`);
                activeTab.classList.replace('text-gray-400', 'text-blue-600');
                activeTab.classList.add('font-bold');

                if(tab === 'map' && map) setTimeout(() => map.invalidateSize(), 100);
                else if (tab === 'list') listManager.renderListsView();
            },
            updateStatus(msg, type) {
                document.getElementById('status-text').innerText = msg;
                const dot = document.getElementById('status-dot');
                dot.className = `w-2 h-2 rounded-full mr-2 animate-pulse ${type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-yellow-400'}`;
            },
            showSaveModal(itemDataString) {
                tempItemToSave = JSON.parse(decodeURIComponent(itemDataString));
                const wrapper = document.getElementById('modal-lists-wrapper');
                wrapper.innerHTML = listManager.getLists().map(l => `
                    <button onclick="listManager.addItemToList('${l.id}', tempItemToSave)" class="w-full text-left px-4 py-3 glass rounded-2xl flex justify-between items-center active:scale-95">
                        <span class="font-bold text-gray-700">${l.name}</span>
                        <i class="fa-solid fa-chevron-right text-gray-400 text-sm"></i>
                    </button>
                `).join('');
                document.getElementById('save-modal').classList.remove('opacity-0', 'pointer-events-none');
                document.getElementById('save-modal-content').classList.remove('scale-95');
            },
            showAddListModal() {
                document.getElementById('create-list-modal').classList.remove('opacity-0', 'pointer-events-none');
                document.getElementById('create-list-modal-content').classList.remove('scale-95');
                document.getElementById('new-list-name').focus();
            },
            closeModal(modalId) {
                document.getElementById(modalId).classList.add('opacity-0', 'pointer-events-none');
                document.getElementById(`${modalId}-content`).classList.add('scale-95');
                tempItemToSave = null;
            }
        };

        const app = {
            init() {
                this.initMap();
                this.fetchData();
                listManager.renderListsView();
                window.uiManager = uiManager;
                window.listManager = listManager;
                window.app = this;
            },
            
            initMap() {
                map = L.map('map-container', { zoomControl: false }).setView([22.3193, 114.1694], 12);
                L.control.zoom({ position: 'topright' }).addTo(map);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap', maxZoom: 19
                }).addTo(map);

                markersGroup = L.markerClusterGroup({
                    maxClusterRadius: 50, spiderfyOnMaxZoom: true, showCoverageOnHover: false, zoomToBoundsOnClick: true
                });
                map.addLayer(markersGroup);
                map.on('moveend', () => this.renderMarkersInBounds());
            },

            // 重構：真實調用資料一站通 API
            async fetchData() {
                uiManager.updateStatus('連線至資料一站通...', 'loading');
                try {
                    // 同步請求基本資訊與實時空位數據
                    const [infoRes, vacancyRes] = await Promise.all([
                        fetch('https://api.data.gov.hk/v1/carpark-info-vacancy?data=info&lang=zh_TW'),
                        fetch('https://api.data.gov.hk/v1/carpark-info-vacancy?data=vacancy&lang=zh_TW')
                    ]);
                    
                    if(!infoRes.ok || !vacancyRes.ok) throw new Error('API 無法接通');

                    const infoData = await infoRes.json();
                    const vacancyData = await vacancyRes.json();

                    const infoList = infoData.results || [];
                    const vacancyList = vacancyData.results || [];
                    
                    // 建立以 park_Id 為 Key 的空位查詢表
                    const vacancyMap = {};
                    vacancyList.forEach(v => {
                        let count = 0;
                        if(v.privateCar && v.privateCar.length > 0) {
                            count = parseInt(v.privateCar[0].vacancy) || 0;
                            if(count < 0) count = 0; // 過濾異常負數
                        }
                        vacancyMap[v.park_Id] = count;
                    });

                    // 整合數據為 App 格式
                    const apiCarParks = infoList.map(cp => {
                        return {
                            id: cp.park_Id || Math.random().toString(),
                            type: 'carpark',
                            name: cp.name || '未命名停車場',
                            lat: parseFloat(cp.latitude),
                            lng: parseFloat(cp.longitude),
                            isPublic: true, 
                            isIndoor: true, // API 未必提供，先預設
                            total: '-', 
                            available: vacancyMap[cp.park_Id] !== undefined ? vacancyMap[cp.park_Id] : '未知'
                        };
                    }).filter(cp => !isNaN(cp.lat) && !isNaN(cp.lng));

                    if(apiCarParks.length === 0) throw new Error('解析不到有效座標');

                    // 結合政府停車場與測試咪錶數據（因為咪錶通常在另一個封閉或格式不同的 API）
                    allPoints = [...apiCarParks, ...MOCK_DATA.meters];
                    
                    uiManager.updateStatus('已實時更新', 'success');
                    this.renderMarkersInBounds();

                } catch (error) {
                    console.log('獲取 API 失敗，使用備用數據:', error);
                    uiManager.updateStatus('離線 (未獲取數據)', 'error');
                    allPoints = MOCK_DATA.meters; // 若出錯，退回只顯示假咪錶
                    this.renderMarkersInBounds();
                }
            },

            renderMarkersInBounds() {
                const bounds = map.getBounds();
                markersGroup.clearLayers();

                const visiblePoints = allPoints.filter(p => bounds.contains([p.lat, p.lng]));

                visiblePoints.forEach(point => {
                    const isMeter = point.type === 'meter';
                    const iconColor = isMeter ? '#3b82f6' : '#8b5cf6';
                    
                    const customIcon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="glass flex items-center justify-center w-10 h-10 rounded-full shadow-lg border-2" style="border-color:${iconColor}; background:rgba(255,255,255,0.85);">
                                <i class="fa-solid ${isMeter ? 'fa-square-parking' : 'fa-building'} text-lg" style="color:${iconColor}"></i>
                               </div>`,
                        iconSize: [40, 40], iconAnchor: [20, 20], popupAnchor: [0, -20]
                    });

                    const marker = L.marker([point.lat, point.lng], { icon: customIcon });
                    const pointDataStr = encodeURIComponent(JSON.stringify(point));
                    let contentHtml = '';

                    if (isMeter) {
                        const available = point.status.filter(s => s === 1).length;
                        const blocks = point.status.map(s => `<div class="h-6 flex-1 rounded-sm ${s === 1 ? 'bg-green-400' : 'bg-red-400'}"></div>`).join('');
                        contentHtml = `
                            <div class="p-2 w-56">
                                <h3 class="font-bold text-lg mb-1 leading-tight">${point.name}</h3>
                                <p class="text-xs text-gray-500 mb-3">路段咪錶 (共 ${point.count} 個)</p>
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-sm font-semibold">即時空位</span>
                                    <span class="text-lg font-bold ${available > 0 ? 'text-green-500' : 'text-red-500'}">${available} / ${point.count}</span>
                                </div>
                                <div class="flex space-x-1 w-full bg-gray-100 p-1 rounded-lg mb-4">${blocks}</div>
                                <div class="flex space-x-2">
                                    <button onclick="app.navigate(${point.lat}, ${point.lng})" class="flex-1 bg-blue-500 text-white py-2 rounded-xl text-sm font-bold shadow-md"><i class="fa-solid fa-location-arrow mr-1"></i>導航</button>
                                    <button onclick="uiManager.showSaveModal('${pointDataStr}')" class="w-10 bg-yellow-400 text-white py-2 rounded-xl text-sm shadow-md"><i class="fa-solid fa-star"></i></button>
                                </div>
                            </div>`;
                    } else {
                        const availColor = point.available > 0 ? 'text-green-500' : (point.available === 0 ? 'text-red-500' : 'text-gray-500');
                        contentHtml = `
                            <div class="p-2 w-56">
                                <div class="flex items-start justify-between mb-1">
                                    <h3 class="font-bold text-lg leading-tight flex-1">${point.name}</h3>
                                </div>
                                <div class="flex space-x-2 mb-3">
                                    <span class="text-[10px] px-2 py-1 rounded-full glass bg-gray-100/50">政府提供數據</span>
                                </div>
                                <div class="glass bg-white/60 rounded-xl p-3 mb-4 flex justify-between items-center">
                                    <div class="text-center w-full">
                                        <div class="text-xs text-gray-500">實時剩餘空位</div>
                                        <div class="font-bold text-2xl ${availColor}">${point.available}</div>
                                    </div>
                                </div>
                                <div class="flex space-x-2">
                                    <button onclick="app.navigate(${point.lat}, ${point.lng})" class="flex-1 bg-blue-500 text-white py-2 rounded-xl text-sm font-bold shadow-md"><i class="fa-solid fa-location-arrow mr-1"></i>導航</button>
                                    <button onclick="uiManager.showSaveModal('${pointDataStr}')" class="w-10 bg-yellow-400 text-white py-2 rounded-xl text-sm shadow-md"><i class="fa-solid fa-star"></i></button>
                                </div>
                            </div>`;
                    }

                    marker.bindPopup(contentHtml, { closeButton: true, minWidth: 240 });
                    markersGroup.addLayer(marker);
                });
            },

            navigate(lat, lng) {
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
                if (isIOS) window.open(`http://maps.apple.com/?daddr=${lat},${lng}&dirflg=d`, '_blank');
                else window.open(`https://maps.google.com/?daddr=$${lat},${lng}`, '_blank');
            },

            flyTo(lat, lng) {
                uiManager.switchTab('map');
                setTimeout(() => map.flyTo([lat, lng], 17, { duration: 1.5 }), 300);
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
