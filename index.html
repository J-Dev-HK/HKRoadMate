<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>HK Parking Glass</title>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"HK Parking Glass","short_name":"HK Parking","display":"standalone","background_color":"#ffffff"}'>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #fdfbfb, #ebedee, #f5f7fa, #c3cfe2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden; height: 100vh; width: 100vw;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 純淨微透視白玻璃效果 */
        .glass {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        
        .glass-heavy {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        #map-container {
            position: absolute; top: 0; left: 0; width: 100%; height: calc(100vh - 80px); z-index: 10;
        }

        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(16px) !important; -webkit-backdrop-filter: blur(16px) !important;
            border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
            border-radius: 1.5rem !important; color: #1f2937 !important;
        }
        .leaflet-container a.leaflet-popup-close-button { color: #4b5563; padding: 12px; font-weight: bold; }

        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
            background-color: rgba(255, 255, 255, 0.7) !important; backdrop-filter: blur(8px);
            border: 3px solid rgba(255, 255, 255, 0.95); border-radius: 50%;
            color: #1e3a8a !important; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .marker-cluster div { background-color: transparent !important; }

        .view-section {
            display: none; height: calc(100vh - 80px); overflow-y: auto; position: absolute;
            top: 0; width: 100%; z-index: 20; padding-top: env(safe-area-inset-top);
        }
        .view-section.active { display: block; }
        #map-view.active { display: block; z-index: 10; }
        
        /* 嚴禁應用於全局的 transition 以免引起地圖拖曳卡頓 */
        .btn-animate { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-800 antialiased selection:bg-blue-300">

    <header class="fixed top-0 w-full glass z-40 px-6 py-4 pt-[max(env(safe-area-inset-top),1rem)] flex justify-between items-center rounded-b-3xl">
        <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-cyan-500">
            <i class="fa-solid fa-square-parking mr-2 text-blue-500"></i>HK Park Glass
        </h1>
        <div id="status-indicator" class="flex items-center text-xs font-semibold px-3 py-1.5 rounded-full glass-heavy">
            <span class="w-2.5 h-2.5 rounded-full bg-yellow-400 mr-2 animate-pulse shadow-sm" id="status-dot"></span>
            <span id="status-text">載入中...</span>
        </div>
    </header>

    <main id="map-view" class="view-section active">
        <div id="map-container"></div>
    </main>

    <main id="list-view" class="view-section px-4 pb-24 pt-28">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold drop-shadow-sm text-gray-800">我的收藏清單</h2>
            <button onclick="uiManager.showAddListModal()" class="glass-heavy px-4 py-2 rounded-2xl text-blue-600 font-semibold shadow-sm btn-animate active:scale-95">
                <i class="fa-solid fa-plus mr-1"></i> 新增
            </button>
        </div>
        <div id="lists-container" class="space-y-6"></div>
    </main>

    <nav class="fixed bottom-0 w-full glass-heavy pb-[env(safe-area-inset-bottom)] z-40 rounded-t-3xl">
        <div class="flex justify-around items-center h-20 px-6">
            <button onclick="uiManager.switchTab('map')" id="tab-map" class="flex flex-col items-center justify-center w-16 text-blue-600 font-bold btn-animate active:scale-90">
                <i class="fa-solid fa-map-location-dot text-2xl mb-1 drop-shadow-sm"></i>
                <span class="text-[10px]">地圖</span>
            </button>
            <button onclick="uiManager.switchTab('list')" id="tab-list" class="flex flex-col items-center justify-center w-16 text-gray-400 btn-animate active:scale-90">
                <i class="fa-solid fa-layer-group text-2xl mb-1"></i>
                <span class="text-[10px]">清單</span>
            </button>
        </div>
    </nav>

    <div id="save-modal" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="glass-heavy w-[90%] max-w-sm rounded-3xl p-6 transform scale-95 transition-transform duration-300" id="save-modal-content">
            <h3 class="text-lg font-bold mb-4 text-gray-800">加入收藏清單</h3>
            <div id="modal-lists-wrapper" class="space-y-3 max-h-60 overflow-y-auto mb-4"></div>
            <button onclick="uiManager.closeModal('save-modal')" class="w-full py-3 rounded-2xl bg-gray-200 text-gray-700 font-semibold btn-animate active:scale-95">取消</button>
        </div>
    </div>

    <div id="create-list-modal" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="glass-heavy w-[90%] max-w-sm rounded-3xl p-6 transform scale-95 transition-transform duration-300" id="create-list-modal-content">
            <h3 class="text-lg font-bold mb-4 text-gray-800">新增清單</h3>
            <input type="text" id="new-list-name" placeholder="例如：上班用、旺角區" class="w-full glass px-4 py-3 rounded-2xl mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-gray-500">
            <div class="flex space-x-3">
                <button onclick="uiManager.closeModal('create-list-modal')" class="flex-1 py-3 rounded-2xl bg-gray-200 text-gray-700 font-semibold btn-animate active:scale-95">取消</button>
                <button onclick="listManager.createList()" class="flex-1 py-3 rounded-2xl bg-blue-500 text-white font-semibold shadow-lg btn-animate active:scale-95">建立</button>
            </div>
        </div>
    </div>

    <script>
        let map, markersGroup;
        let allPointsMap = new Map();
        let tempItemToSave = null;

        // 共用圖標，避免拖動地圖時記憶體溢出
        const meterIcon = L.divIcon({
            className: 'custom-div-icon',
            html: `<div class="glass flex items-center justify-center w-10 h-10 rounded-full shadow-md border-[3px] border-white"><i class="fa-solid fa-square-parking text-[22px] text-blue-500"></i></div>`,
            iconSize: [40, 40], iconAnchor: [20, 20], popupAnchor: [0, -20]
        });

        const carparkIcon = L.divIcon({
            className: 'custom-div-icon',
            html: `<div class="glass flex items-center justify-center w-10 h-10 rounded-full shadow-md border-[3px] border-white"><i class="fa-solid fa-building text-[20px] text-purple-500"></i></div>`,
            iconSize: [40, 40], iconAnchor: [20, 20], popupAnchor: [0, -20]
        });

        // 【核心修復】智能解碼器：專門對付香港政府 CSV 的 UTF-16LE 亂碼陷阱
        async function fetchAndDecodeCSV(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('連線失敗');
                const buffer = await res.arrayBuffer();
                const view = new Uint8Array(buffer);
                
                // 檢查是否為 UTF-16LE (BOM: FF FE)
                if (view.length >= 2 && view[0] === 0xFF && view[1] === 0xFE) {
                    return new TextDecoder('utf-16le').decode(buffer);
                }
                
                // 預設以 UTF-8 解碼，若發現異常 Null bytes 則轉回 UTF-16LE
                let text = new TextDecoder('utf-8').decode(buffer);
                if (text.indexOf('\u0000') !== -1) {
                    text = new TextDecoder('utf-16le').decode(buffer);
                }
                return text;
            } catch (err) {
                console.error('抓取失敗:', err);
                return null;
            }
        }

        // 防彈級 CSV 解析器
        function parseCSV(text) {
            if (!text) return [];
            text = text.replace(/^\uFEFF/, ''); // 移除可能的 BOM
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
            if (lines.length === 0) return [];
            
            // 處理標題行的雙引號
            const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                const row = lines[i];
                let values = [], insideQuote = false, currentVal = '';
                for(let char of row) {
                    if (char === '"') insideQuote = !insideQuote;
                    else if (char === ',' && !insideQuote) { values.push(currentVal.trim()); currentVal = ''; }
                    else currentVal += char;
                }
                values.push(currentVal.trim());
                
                const obj = {};
                headers.forEach((h, idx) => { 
                    obj[h] = values[idx] ? values[idx].replace(/^"|"$/g, '') : ''; 
                });
                result.push(obj);
            }
            return result;
        }

        // 本地清單管理系統
        const listManager = {
            getLists() {
                const lists = localStorage.getItem('hkParkLists');
                return lists ? JSON.parse(lists) : [{ id: 'default', name: '預設收藏', items: [] }];
            },
            saveLists(lists) {
                localStorage.setItem('hkParkLists', JSON.stringify(lists));
                this.renderListsView();
            },
            createList() {
                const nameInput = document.getElementById('new-list-name');
                const name = nameInput.value.trim();
                if (!name) return;
                const lists = this.getLists();
                lists.push({ id: 'list_' + Date.now(), name, items: [] });
                this.saveLists(lists);
                nameInput.value = '';
                uiManager.closeModal('create-list-modal');
            },
            deleteList(listId) {
                if(listId === 'default') return alert("無法刪除預設清單");
                if(confirm("確定刪除此清單？")) {
                    this.saveLists(this.getLists().filter(l => l.id !== listId));
                }
            },
            addItemToList(listId, item) {
                const lists = this.getLists();
                const targetList = lists.find(l => l.id === listId);
                if (targetList) {
                    if(!targetList.items.find(i => i.id === item.id)) {
                        targetList.items.push(item);
                        this.saveLists(lists);
                        alert('已加入收藏！');
                    } else alert('項目已存在於此清單。');
                }
                uiManager.closeModal('save-modal');
            },
            removeItem(listId, itemId) {
                const lists = this.getLists();
                const list = lists.find(l => l.id === listId);
                if(list) {
                    list.items = list.items.filter(i => i.id !== itemId);
                    this.saveLists(lists);
                }
            },
            renderListsView() {
                const container = document.getElementById('lists-container');
                const lists = this.getLists();
                container.innerHTML = '';
                
                if(lists.length === 0) return container.innerHTML = '<div class="text-center text-gray-400 mt-10 font-bold">尚無清單</div>';

                lists.forEach(list => {
                    let itemsHtml = list.items.length === 0 
                        ? '<p class="text-sm text-gray-400 italic px-2">無收藏項目</p>' 
                        : list.items.map(item => {
                            const availVal = item.available !== undefined ? item.available : (item.statusArray ? item.statusArray.filter(s=>s===1).length : 0);
                            const availColor = availVal > 0 ? 'text-green-500' : (availVal === 0 ? 'text-red-500' : 'text-gray-500');
                            return `
                                <div class="glass p-3 rounded-2xl flex justify-between items-center mb-2 btn-animate active:scale-95" onclick="app.flyTo(${item.lat}, ${item.lng})">
                                    <div class="flex-1">
                                        <h4 class="font-bold text-gray-800 text-sm">${item.name}</h4>
                                        <p class="text-[10px] font-bold text-gray-400 mt-0.5">${item.type === 'carpark' ? '停車場' : '路段咪錶'}</p>
                                    </div>
                                    <div class="flex items-center space-x-3">
                                        <div class="text-right">
                                            <span class="block text-[10px] text-gray-400 font-bold">空位</span>
                                            <span class="font-bold text-lg leading-none ${availColor}">${availVal}</span>
                                        </div>
                                        <button onclick="event.stopPropagation(); listManager.removeItem('${list.id}', '${item.id}')" class="text-red-400 bg-red-50 p-2 rounded-xl btn-animate active:scale-90"><i class="fa-solid fa-trash text-sm"></i></button>
                                    </div>
                                </div>
                            `;
                        }).join('');

                    container.innerHTML += `
                        <div class="glass-heavy rounded-3xl p-5 shadow-sm relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-400"></div>
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-bold text-gray-800">${list.name} <span class="text-xs font-normal text-gray-400 ml-2 bg-gray-100 px-2 py-1 rounded-full">${list.items.length} 項</span></h3>
                                ${list.id !== 'default' ? `<button onclick="listManager.deleteList('${list.id}')" class="text-gray-400 hover:text-red-500 bg-gray-100 w-8 h-8 rounded-full"><i class="fa-solid fa-xmark"></i></button>` : ''}
                            </div>
                            <div class="space-y-1">${itemsHtml}</div>
                        </div>
                    `;
                });
            }
        };

        const uiManager = {
            switchTab(tab) {
                document.getElementById('map-view').classList.remove('active');
                document.getElementById('list-view').classList.remove('active');
                
                document.getElementById('tab-map').classList.replace('text-blue-600', 'text-gray-400');
                document.getElementById('tab-map').classList.remove('font-bold');
                document.getElementById('tab-list').classList.replace('text-blue-600', 'text-gray-400');
                document.getElementById('tab-list').classList.remove('font-bold');

                document.getElementById(`${tab}-view`).classList.add('active');
                const activeTab = document.getElementById(`tab-${tab}`);
                activeTab.classList.replace('text-gray-400', 'text-blue-600');
                activeTab.classList.add('font-bold');

                if(tab === 'map' && map) setTimeout(() => map.invalidateSize(), 100);
                else if (tab === 'list') listManager.renderListsView();
            },
            updateStatus(msg, type) {
                document.getElementById('status-text').innerText = msg;
                const dot = document.getElementById('status-dot');
                dot.className = `w-2.5 h-2.5 rounded-full mr-2 shadow-sm ${type === 'loading' ? 'animate-pulse bg-yellow-400' : type === 'success' ? 'bg-green-500' : 'bg-red-500'}`;
            },
            showSaveModal(pointId) {
                tempItemToSave = allPointsMap.get(pointId);
                if(!tempItemToSave) return;
                const wrapper = document.getElementById('modal-lists-wrapper');
                wrapper.innerHTML = listManager.getLists().map(l => `
                    <button onclick="listManager.addItemToList('${l.id}', tempItemToSave)" class="w-full text-left px-4 py-3.5 glass rounded-2xl flex justify-between items-center btn-animate active:scale-95 mb-2">
                        <span class="font-bold text-gray-700">${l.name}</span>
                        <i class="fa-solid fa-plus text-blue-500 text-sm bg-blue-50 w-6 h-6 flex items-center justify-center rounded-full"></i>
                    </button>
                `).join('');
                document.getElementById('save-modal').classList.remove('opacity-0', 'pointer-events-none');
                document.getElementById('save-modal-content').classList.remove('scale-95');
            },
            showAddListModal() {
                document.getElementById('create-list-modal').classList.remove('opacity-0', 'pointer-events-none');
                document.getElementById('create-list-modal-content').classList.remove('scale-95');
                document.getElementById('new-list-name').focus();
            },
            closeModal(modalId) {
                document.getElementById(modalId).classList.add('opacity-0', 'pointer-events-none');
                document.getElementById(`${modalId}-content`).classList.add('scale-95');
                tempItemToSave = null;
            }
        };

        const app = {
            init() {
                this.initMap();
                this.fetchData();
                listManager.renderListsView();
                window.uiManager = uiManager;
                window.listManager = listManager;
                window.app = this;
            },
            
            initMap() {
                map = L.map('map-container', { zoomControl: false }).setView([22.3193, 114.1694], 13);
                L.control.zoom({ position: 'topright' }).addTo(map);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap', maxZoom: 19
                }).addTo(map);

                // 效能關鍵：啟動 chunkedLoading 讓過萬點位分批載入，維持介面順暢
                markersGroup = L.markerClusterGroup({
                    maxClusterRadius: 60, spiderfyOnMaxZoom: true, showCoverageOnHover: false, chunkedLoading: true
                });
                map.addLayer(markersGroup);
            },

            async fetchData() {
                uiManager.updateStatus('抓取全港實時數據...', 'loading');
                allPointsMap.clear();

                // 任務 1：停車場 API (JSON 格式，較穩定)
                try {
                    const [cpInfoRes, cpVacRes] = await Promise.all([
                        fetch('https://api.data.gov.hk/v1/carpark-info-vacancy?data=info&lang=zh_TW'),
                        fetch('https://api.data.gov.hk/v1/carpark-info-vacancy?data=vacancy&lang=zh_TW')
                    ]);
                    
                    if(cpInfoRes.ok && cpVacRes.ok) {
                        const infoData = await cpInfoRes.json();
                        const vacancyData = await cpVacRes.json();
                        const vacancyMap = {};
                        
                        (vacancyData.results || []).forEach(v => {
                            let count = 0;
                            if(v.privateCar && v.privateCar.length > 0) count = parseInt(v.privateCar[0].vacancy) || 0;
                            vacancyMap[v.park_Id] = count < 0 ? 0 : count;
                        });

                        (infoData.results || []).forEach(cp => {
                            const lat = parseFloat(cp.latitude);
                            const lng = parseFloat(cp.longitude);
                            if(isNaN(lat) || isNaN(lng)) return;
                            
                            const id = 'cp_' + cp.park_Id;
                            allPointsMap.set(id, {
                                id: id, type: 'carpark', name: cp.name || '未命名停車場',
                                lat: lat, lng: lng, isPublic: true, isIndoor: true, total: '-', 
                                available: vacancyMap[cp.park_Id] !== undefined ? vacancyMap[cp.park_Id] : '未知'
                            });
                        });
                    }
                } catch (error) {
                    console.log('停車場 API 載入失敗:', error);
                }

                // 任務 2：全港咪錶 CSV (解碼核心應用)
                try {
                    const meterInfoText = await fetchAndDecodeCSV('https://resource.data.one.gov.hk/td/psiparkingspaces/spaceinfo/parkingspaces.csv');
                    const meterVacText = await fetchAndDecodeCSV('https://resource.data.one.gov.hk/td/psiparkingspaces/occupancystatus/occupancystatus.csv');
                    
                    if (meterInfoText && meterVacText) {
                        const meterVacancies = parseCSV(meterVacText);
                        const meterVacMap = {};
                        meterVacancies.forEach(m => {
                            const spaceId = m['ParkingSpaceId'] || Object.values(m)[0];
                            const status = m['OccupancyStatus'] || Object.values(m)[1];
                            if(spaceId) meterVacMap[spaceId] = status;
                        });

                        const meters = parseCSV(meterInfoText);
                        const streetSections = {};

                        meters.forEach(m => {
                            const lat = parseFloat(m['Latitude']);
                            const lng = parseFloat(m['Longitude']);
                            if(isNaN(lat) || isNaN(lng)) return;

                            // 這裡直接使用政府資料的「路段」作為分段標準
                            const sectionName = m['SectionOfStreet_tc'] || m['Street_tc'] || '未命名路段';
                            const spaceId = m['ParkingSpaceId'];
                            const status = meterVacMap[spaceId] || 'O'; 
                            const isVacant = (status === 'V' || status === 'Vacant' || status === '0') ? 1 : 0;

                            if(!streetSections[sectionName]) {
                                streetSections[sectionName] = {
                                    id: 'metersec_' + encodeURIComponent(sectionName).substring(0,20) + Math.floor(Math.random()*1000), 
                                    type: 'meter', name: sectionName,
                                    latSum: 0, lngSum: 0, count: 0, available: 0, statusArray: []
                                };
                            }
                            
                            streetSections[sectionName].latSum += lat;
                            streetSections[sectionName].lngSum += lng;
                            streetSections[sectionName].count += 1;
                            streetSections[sectionName].available += isVacant;
                            streetSections[sectionName].statusArray.push(isVacant);
                        });

                        // 結算每個「路段」的中心座標，確保地圖圖標準確落在該街道
                        Object.values(streetSections).forEach(sec => {
                            sec.lat = sec.latSum / sec.count;
                            sec.lng = sec.lngSum / sec.count;
                            allPointsMap.set(sec.id, sec);
                        });
                    }
                } catch (error) {
                    console.log('咪錶 CSV 解析失敗:', error);
                }

                if(allPointsMap.size > 0) {
                    uiManager.updateStatus(`已載入 ${allPointsMap.size} 個位置`, 'success');
                } else {
                    uiManager.updateStatus('連線異常，請稍後重試', 'error');
                }
                
                this.renderAllMarkers();
            },

            renderAllMarkers() {
                markersGroup.clearLayers();
                const markers = []; 

                allPointsMap.forEach((point, id) => {
                    const isMeter = point.type === 'meter';
                    const marker = L.marker([point.lat, point.lng], { icon: isMeter ? meterIcon : carparkIcon });
                    
                    let contentHtml = '';

                    if (isMeter) {
                        const available = point.available;
                        // 利用 flex-wrap 適應任意數量的咪錶格子
                        const blocks = point.statusArray.map(s => `<div class="h-6 min-w-[12px] flex-grow rounded-[4px] ${s === 1 ? 'bg-green-400' : 'bg-red-400 shadow-inner'}"></div>`).join('');
                        contentHtml = `
                            <div class="p-1 w-[260px] max-h-72 overflow-y-auto">
                                <div class="bg-blue-50 text-blue-600 text-[10px] font-bold px-2 py-1 rounded-lg inline-block mb-2">路邊咪錶路段</div>
                                <h3 class="font-bold text-lg mb-4 leading-snug text-gray-800">${point.name}</h3>
                                
                                <div class="glass bg-white/70 rounded-2xl p-3 mb-4 flex justify-between items-center shadow-sm">
                                    <div class="text-center w-1/2 border-r border-gray-200">
                                        <div class="text-[10px] text-gray-500 font-bold mb-1">該路段總錶位</div>
                                        <div class="font-bold text-lg text-gray-700">${point.count}</div>
                                    </div>
                                    <div class="text-center w-1/2">
                                        <div class="text-[10px] text-gray-500 font-bold mb-1">即時空位</div>
                                        <div class="font-bold text-2xl ${available > 0 ? 'text-green-500' : 'text-red-500'}">${available}</div>
                                    </div>
                                </div>
                                <div class="flex flex-wrap gap-1.5 w-full bg-gray-100/80 p-2.5 rounded-xl mb-5 shadow-inner">
                                    ${blocks}
                                </div>
                                <div class="flex space-x-3">
                                    <button onclick="app.navigate(${point.lat}, ${point.lng})" class="flex-1 bg-blue-500 text-white py-3 rounded-xl text-sm font-bold shadow-lg btn-animate active:scale-95 flex items-center justify-center"><i class="fa-solid fa-location-arrow mr-2"></i>開始導航</button>
                                    <button onclick="uiManager.showSaveModal('${id}')" class="w-[50px] bg-white border-2 border-gray-100 text-yellow-400 py-3 rounded-xl text-lg shadow-sm btn-animate active:scale-90 flex items-center justify-center"><i class="fa-solid fa-star"></i></button>
                                </div>
                            </div>`;
                    } else {
                        const availColor = point.available > 0 ? 'text-green-500' : (point.available === 0 ? 'text-red-500' : 'text-gray-500');
                        contentHtml = `
                            <div class="p-1 w-[260px]">
                                <div class="bg-purple-50 text-purple-600 text-[10px] font-bold px-2 py-1 rounded-lg inline-block mb-2">停車場</div>
                                <h3 class="font-bold text-lg mb-4 leading-snug text-gray-800">${point.name}</h3>
                                
                                <div class="glass bg-white/70 rounded-2xl p-4 mb-5 flex justify-between items-center shadow-sm">
                                    <div class="text-center w-full">
                                        <div class="text-xs text-gray-500 font-bold mb-1">實時剩餘空位</div>
                                        <div class="font-bold text-4xl ${availColor}">${point.available}</div>
                                    </div>
                                </div>
                                <div class="flex space-x-3">
                                    <button onclick="app.navigate(${point.lat}, ${point.lng})" class="flex-1 bg-blue-500 text-white py-3 rounded-xl text-sm font-bold shadow-lg btn-animate active:scale-95 flex items-center justify-center"><i class="fa-solid fa-location-arrow mr-2"></i>開始導航</button>
                                    <button onclick="uiManager.showSaveModal('${id}')" class="w-[50px] bg-white border-2 border-gray-100 text-yellow-400 py-3 rounded-xl text-lg shadow-sm btn-animate active:scale-90 flex items-center justify-center"><i class="fa-solid fa-star"></i></button>
                                </div>
                            </div>`;
                    }

                    marker.bindPopup(contentHtml, { closeButton: true, minWidth: 280 });
                    markers.push(marker);
                });

                markersGroup.addLayers(markers);
            },

            navigate(lat, lng) {
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
                if (isIOS) window.open(`http://maps.apple.com/?daddr=${lat},${lng}&dirflg=d`, '_blank');
                else window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
            },

            flyTo(lat, lng) {
                uiManager.switchTab('map');
                setTimeout(() => map.flyTo([lat, lng], 17, { duration: 1.5 }), 300);
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
